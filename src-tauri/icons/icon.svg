<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Tiling grid pattern - 4 tiles arranged in adaptive layout -->
  <!-- Left large tile -->
  <rect x="48" y="48" width="220" height="416" rx="16" fill="#89b4fa" opacity="0.9"/>
  <!-- Top right tile -->
  <rect x="284" y="48" width="180" height="200" rx="16" fill="#a6e3a1" opacity="0.85"/>
  <!-- Bottom right tile -->
  <rect x="284" y="264" width="180" height="200" rx="16" fill="#f9e2af" opacity="0.8"/>
  <!-- Terminal cursor blink in left tile -->
  <rect x="80" y="120" width="12" height="24" rx="2" fill="#1e1e2e" opacity="0.7"/>
  <!-- Terminal lines in left tile -->
  <rect x="104" y="122" width="120" height="4" rx="2" fill="#1e1e2e" opacity="0.3"/>
  <rect x="80" y="156" width="150" height="4" rx="2" fill="#1e1e2e" opacity="0.2"/>
  <rect x="80" y="172" width="100" height="4" rx="2" fill="#1e1e2e" opacity="0.2"/>
  <!-- Code lines in top right tile -->
  <rect x="310" y="100" width="80" height="4" rx="2" fill="#1e1e2e" opacity="0.3"/>
  <rect x="310" y="116" width="120" height="4" rx="2" fill="#1e1e2e" opacity="0.2"/>
  <rect x="310" y="132" width="60" height="4" rx="2" fill="#1e1e2e" opacity="0.2"/>
  <!-- File icon in bottom right tile -->
  <rect x="340" y="320" width="80" height="96" rx="8" fill="#1e1e2e" opacity="0.2"/>
  <rect x="354" y="340" width="52" height="3" rx="1" fill="#1e1e2e" opacity="0.3"/>
  <rect x="354" y="352" width="40" height="3" rx="1" fill="#1e1e2e" opacity="0.3"/>
  <rect x="354" y="364" width="48" height="3" rx="1" fill="#1e1e2e" opacity="0.3"/>
</svg>
