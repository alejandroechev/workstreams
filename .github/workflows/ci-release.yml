name: CI / Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Compute the next SemVer tag from conventional-commit history. If the only
  # commits since the last tag are docs:, set should_release=false and the
  # build/release jobs are short-circuited. Tests still run unconditionally
  # so docs-only changes can't sneak through a code regression.
  decide-release:
    name: Decide release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      tag: ${{ steps.decide.outputs.tag }}
      bump: ${{ steps.decide.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute next version
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          last_tag=$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)
          if [ -z "$last_tag" ]; then
            range_spec="HEAD"
            echo "No prior tag found; reading all commits on HEAD."
          else
            range_spec="${last_tag}..HEAD"
            echo "Last tag: $last_tag"
          fi

          # Stream commit messages as NUL-separated records so newlines inside
          # message bodies don't confuse parsing.
          mapfile -d $'\0' -t messages < <(git log --format=%B%x00 "$range_spec")

          result=$(node --input-type=module -e "
            import { computeNextVersion } from './scripts/compute-next-version.mjs';
            const last = process.argv[1] || null;
            const msgs = process.argv.slice(2);
            const out = computeNextVersion(last, msgs, { fallback: 'v0.1.0' });
            process.stdout.write(JSON.stringify(out));
          " "$last_tag" "${messages[@]}")

          echo "Decision: $result"
          if [ "$result" = "null" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only or empty range. Skipping release."
          else
            tag=$(node -e "console.log(JSON.parse(process.argv[1]).tag)" "$result")
            bump=$(node -e "console.log(JSON.parse(process.argv[1]).bump)" "$result")
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "bump=${bump}" >> "$GITHUB_OUTPUT"
            echo "::notice::Next release will be ${tag} (${bump} bump)."
          fi

  unit-tests:
    name: Unit tests (vitest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run vitest with coverage (90% threshold)
        run: npx vitest run --coverage

  lint-discipline:
    name: Lint + discipline checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: ESLint (full src tree)
        run: npx eslint src
      - name: Test-file existence check
        run: node scripts/check-test-files.mjs

  rust-quality:
    name: Rust quality (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux build deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "rust-quality"
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy -D warnings
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  smart-doc-gate:
    name: Smart doc gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check doc-vs-source delta
        shell: bash
        run: |
          set -euo pipefail
          # On push to master, compare HEAD against its parent. Falls back
          # to the previous tag if running on a tag push.
          base=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          if [ -z "$base" ]; then
            echo "::notice::No parent commit (first commit?), skipping doc gate"
            exit 0
          fi
          RANGE="${base}..HEAD"
          SOURCE_LINES=$(git diff --numstat $RANGE -- 'src/*' 'src-tauri/src/*' | awk '{ sum += $1 + $2 } END { print sum+0 }')
          DOC_CHANGES=$(git diff --name-only $RANGE -- 'README.md' 'docs/' 2>/dev/null | wc -l | awk '{print $1+0}')
          BYPASS=$(git log $RANGE --format='%B' | grep -c '\[no-docs:' || echo 0)
          echo "Source lines: $SOURCE_LINES, doc files: $DOC_CHANGES, bypass markers: $BYPASS"
          if [ "$SOURCE_LINES" -gt 200 ] && [ "$DOC_CHANGES" -eq 0 ] && [ "$BYPASS" -eq 0 ]; then
            echo "::error::Smart doc gate: $SOURCE_LINES lines of source changed but no docs touched"
            echo "::error::Update README.md, docs/system-diagram.md, or docs/adrs/ — or add '[no-docs: <reason>]' in a commit message"
            exit 1
          fi
          echo "✅ Smart doc gate passed"

  rust-tests:
    name: Rust unit tests (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - name: cargo test --lib
        working-directory: src-tauri
        run: cargo test --lib --no-fail-fast

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-windows:
    name: Build Windows release
    needs: [decide-release, unit-tests, lint-discipline, rust-quality, smart-doc-gate, e2e-tests, rust-tests]
    if: needs.decide-release.outputs.should_release == 'true'
    runs-on: windows-latest
    outputs:
      tag: ${{ needs.decide-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - name: Install dependencies
        run: npm ci

      - name: Stamp computed version into manifests for the build
        shell: bash
        env:
          TAG: ${{ needs.decide-release.outputs.tag }}
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          echo "Stamping version $ver into package.json + tauri.conf.json"
          node -e "
            const fs = require('fs');
            for (const p of ['package.json', 'src-tauri/tauri.conf.json']) {
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = process.argv[1];
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            }
          " "$ver"

      - name: Build Tauri app
        run: npx tauri build

      - name: Stage artifacts
        shell: bash
        env:
          TAG: ${{ needs.decide-release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p staging
          nsis=$(find src-tauri/target/release/bundle/nsis -name "*.exe" -print -quit 2>/dev/null || true)
          if [ -z "$nsis" ]; then
            echo "::error::NSIS installer not found under src-tauri/target/release/bundle/nsis"
            ls -la src-tauri/target/release/bundle/ || true
            exit 1
          fi
          cp "$nsis" staging/

          msi=$(find src-tauri/target/release/bundle/msi -name "*.msi" -print -quit 2>/dev/null || true)
          if [ -z "$msi" ]; then
            echo "::error::MSI installer not found under src-tauri/target/release/bundle/msi"
            exit 1
          fi
          cp "$msi" staging/

          if [ ! -f src-tauri/target/release/workstreams.exe ]; then
            echo "::error::Raw workstreams.exe not found under src-tauri/target/release"
            exit 1
          fi
          cp src-tauri/target/release/workstreams.exe "staging/workstreams-${TAG}.exe"

          echo "Staged artifacts:"
          ls -la staging/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ needs.decide-release.outputs.tag }}
          path: staging/*
          retention-days: 30

  release:
    name: Tag + GitHub Release
    needs: [decide-release, build-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.decide-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-${{ needs.decide-release.outputs.tag }}
          path: dist/

      - name: Create tag (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.decide-release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally — skipping create"
          else
            git tag -a "$TAG" -m "Release $TAG (${{ needs.decide-release.outputs.bump }} bump from ${{ github.sha }})"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.decide-release.outputs.tag }}
          BUMP: ${{ needs.decide-release.outputs.bump }}
        run: |
          set -euo pipefail
          notes_file=$(mktemp)
          {
            echo "Automated release for commit ${{ github.sha }}"
            echo
            echo "**Bump kind:** \`${BUMP}\`"
            echo "**Built on:** \`windows-latest\` from \`master\`"
            echo
            echo "## Commit log since previous tag"
            prev_tag=$(git tag --list 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)
            if [ -n "$prev_tag" ]; then
              git log "${prev_tag}..${{ github.sha }}" --pretty=format:"- %s (%h)"
            else
              git log --pretty=format:"- %s (%h)" -20
            fi
          } > "$notes_file"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — re-uploading artifacts (clobber)."
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$notes_file" \
              dist/*
          fi
