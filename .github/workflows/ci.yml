name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    name: Unit tests (vitest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run vitest with coverage (90% threshold)
        run: npx vitest run --coverage

  lint-discipline:
    name: Lint + discipline checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: ESLint (full src tree)
        run: npx eslint src
      - name: Test-file existence check
        run: node scripts/check-test-files.mjs

  rust-quality:
    name: Rust quality (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux build deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "rust-quality"
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy -D warnings
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  smart-doc-gate:
    name: Smart doc gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check doc-vs-source delta
        shell: bash
        run: |
          set -euo pipefail
          base=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          if [ -z "$base" ]; then
            echo "::notice::No parent commit (first commit?), skipping doc gate"
            exit 0
          fi
          RANGE="${base}..HEAD"
          SOURCE_LINES=$(git diff --numstat $RANGE -- 'src/*' 'src-tauri/src/*' | awk '{ sum += $1 + $2 } END { print sum+0 }')
          DOC_CHANGES=$(git diff --name-only $RANGE -- 'README.md' 'docs/' 2>/dev/null | wc -l | awk '{print $1+0}')
          BYPASS=$(git log $RANGE --format='%B' | grep -c '\[no-docs:' || echo 0)
          echo "Source lines: $SOURCE_LINES, doc files: $DOC_CHANGES, bypass markers: $BYPASS"
          if [ "$SOURCE_LINES" -gt 200 ] && [ "$DOC_CHANGES" -eq 0 ] && [ "$BYPASS" -eq 0 ]; then
            echo "::error::Smart doc gate: $SOURCE_LINES lines of source changed but no docs touched"
            echo "::error::Update README.md, docs/system-diagram.md, or docs/adrs/ — or add '[no-docs: <reason>]' in a commit message"
            exit 1
          fi
          echo "✅ Smart doc gate passed"

  rust-tests:
    name: Rust unit tests (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - name: cargo test --lib
        working-directory: src-tauri
        run: cargo test --lib --no-fail-fast

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
